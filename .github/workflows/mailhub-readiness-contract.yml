name: MailHub Readiness Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  readiness-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check MailHub readiness artifact contract
        run: |
          npm run audit:github-routing-secrets-contract
          npm run audit:mailhub-staff-workflow-contract
          npm run audit:mailhub-readiness-contract
          npm run audit:mailhub-routing-next-contract
          npm run audit:mailhub-routing-proof-contract
