name: MailHub SLA Alerts

on:
  schedule:
    # 毎15分実行（重複防止が24hなのでSlackは荒れにくい）
    - cron: "*/15 * * * *"
  workflow_dispatch:
    # 手動実行も可能
    inputs:
      environment:
        description: "Environment (staging or production)"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: mailhub-alerts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            # スケジュール実行の場合はproduction
            echo "env=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Set URL
        id: url
        run: |
          if [ "${{ steps.env.outputs.env }}" == "production" ]; then
            echo "url=${{ secrets.MAILHUB_PROD_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ secrets.MAILHUB_STAGING_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate automation secrets
        id: preflight
        shell: bash
        run: |
          missing=0
          if [ -z "${{ steps.url.outputs.url }}" ]; then
            echo "::warning::MAILHUB_${{ steps.env.outputs.env == 'production' && 'PROD' || 'STAGING' }}_URL is not configured"
            missing=1
          fi
          if [ -z "${{ secrets.MAILHUB_ALERTS_SECRET }}" ]; then
            echo "::warning::MAILHUB_ALERTS_SECRET is not configured"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "schedule" ]; then
              echo "Scheduled run skipped because required secrets are missing."
              exit 0
            fi
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Health check
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          headers=()
          if [ -n "${{ secrets.MAILHUB_VERCEL_PROTECTION_BYPASS }}" ]; then
            headers+=(-H "x-vercel-protection-bypass: ${{ secrets.MAILHUB_VERCEL_PROTECTION_BYPASS }}")
          fi
          curl --fail --retry 3 --max-time 20 "${headers[@]}" \
            "${{ steps.url.outputs.url }}/api/health"

      - name: Run SLA alerts
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          headers=(-H "Authorization: Bearer ${{ secrets.MAILHUB_ALERTS_SECRET }}")
          if [ -n "${{ secrets.MAILHUB_VERCEL_PROTECTION_BYPASS }}" ]; then
            headers+=(-H "x-vercel-protection-bypass: ${{ secrets.MAILHUB_VERCEL_PROTECTION_BYPASS }}")
          fi
          RESPONSE=$(curl --fail --retry 3 --max-time 20 \
            "${headers[@]}" \
            "${{ steps.url.outputs.url }}/api/mailhub/alerts/run?scope=all")
          
          echo "Response: $RESPONSE"
          
          # truncatedがtrueの場合は警告を出す（exit codeは0のまま）
          if echo "$RESPONSE" | grep -q '"truncated":true'; then
            echo "⚠️ Warning: Alert truncated (limit reached)"
          fi

